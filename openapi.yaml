  # ==================== 管理端 ====================
  /admin/admins:
    post:
      tags:
        - 管理端
      summary: 创建管理员
      description: 仅超级管理员可调用
      operationId: createAdmin
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
                - password
                - nickname
                - verifyCode
              properties:
                phone:
                  type: string
                  pattern: '^1[3-9]\d{9}$'
                password:
                  type: string
                  minLength: 8
                  maxLength: 16
                nickname:
                  type: string
                  minLength: 2
                  maxLength: 15
                verifyCode:
                  type: string
                  pattern: '^\d{6}$'
            example:
              phone: "13900139000"
              password: "Admin123456"
              nickname: "系统管理员"
              verifyCode: "123456"
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
