openapi: 3.0.3
info:
  title: 智慧校园生活助手 API
  description: 智慧校园生活助手后端接口文档 V1.3
  version: 1.3.0
  contact:
    name: 开发团队
  license:
    name: 内部使用

servers:
  - url: http://localhost:8080/v1
    description: 本地开发服务器
  - url: https://api.example.com/v1
    description: 生产服务器

security:
  - bearerAuth: []

tags:
  - name: 认证模块
    description: 注册、登录、登出、Token刷新、验证码
  - name: 用户模块
    description: 个人信息管理、密码修改、头像上传、换绑手机、账号注销
  - name: 学期管理
    description: 学期列表、当前学期设置
  - name: 课程管理
    description: 课表导入、课程CRUD
  - name: 日程管理
    description: 日程CRUD、状态更新、防冲突检测、提醒
  - name: 健康数据
    description: 睡眠、运动、体重记录及图表
  - name: 智能分析
    description: 睡眠分析、运动分析、压力指数、拖延预警、运动推送
  - name: 周报系统
    description: 周报查询、重新生成
  - name: 公告模块
    description: 公告获取、关闭
  - name: 管理端
    description: 管理员操作、仪表盘、用户管理、日志管理、配置管理

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ==================== 通用响应结构 ====================
    Result:
      type: object
      properties:
        code:
          type: integer
          description: 状态码，200表示成功
          example: 200
        message:
          type: string
          description: 响应消息
          example: 操作成功
        data:
          description: 响应数据，可为对象、数组或null

    PageResponse:
      type: object
      properties:
        total:
          type: integer
          description: 总记录数
        page:
          type: integer
          description: 当前页码
        pageSize:
          type: integer
          description: 每页数量
        list:
          type: array
          description: 数据列表
          items: {}

    # ==================== 错误响应 ====================
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          description: 错误码
        subCode:
          type: string
          description: 错误子类型（仅403时有）
          enum:
            - insufficient_permission
            - account_frozen
            - temp_password_required
        message:
          type: string
          description: 错误消息

    # ==================== 枚举定义 ====================
    RoleEnum:
      type: string
      description: 用户角色
      enum:
        - user
        - admin
        - super_admin

    CategoryEnum:
      type: string
      description: 日程分类
      enum:
        - course
        - exam
        - activity
        - ddl
        - personal

    StatusEnum:
      type: string
      description: 日程状态
      enum:
        - pending
        - in_progress
        - overdue
        - completed

    ReminderEnum:
      type: string
      description: 提醒设置
      enum:
        - none
        - "15min"
        - "1hour"
        - "1day"

    SleepQualityEnum:
      type: string
      description: 睡眠质量
      enum:
        - 极佳
        - 较好
        - 一般
        - 较差

    FreezeReasonEnum:
      type: string
      description: 冻结原因
      enum:
        - content_violation
        - security_risk
        - abnormal_checkin
        - other

    SportTypeEnum:
      type: string
      description: 运动类型
      enum:
        - running
        - swimming
        - basketball
        - football
        - badminton
        - fitness
        - walking
        - other

    ActionEnum:
      type: string
      description: 操作类型
      enum:
        - freeze_user
        - unfreeze_user
        - auto_freeze_user
        - reset_password
        - publish_announcement
        - offline_announcement
        - update_config
        - create_admin
        - clean_logs

    VerifyCodeTypeEnum:
      type: string
      description: 验证码类型
      enum:
        - register
        - bind
        - admin_create

    # ==================== 数据模型 ====================
    User:
      type: object
      properties:
        userId:
          type: string
          description: 用户ID
        phone:
          type: string
          description: 手机号（脱敏）
          pattern: '^1[3-9]\d{2}\*\*\*\d{4}$'
        nickname:
          type: string
          description: 昵称
        avatar:
          type: string
          description: 头像URL
        gender:
          type: string
          description: 性别
          enum: [未知, 男, 女]
        grade:
          type: string
          description: 年级
          enum: [大一, 大二, 大三, 大四, 研究生]
        birthDate:
          type: string
          format: date
          description: 出生日期
          nullable: true
        department:
          type: string
          description: 院系/专业
          nullable: true
        height:
          type: integer
          description: 身高(cm)
          minimum: 100
          maximum: 250
          nullable: true
        weight:
          type: number
          format: float
          description: 体重(kg)
          minimum: 30
          maximum: 250
          nullable: true
        createTime:
          type: string
          format: date-time
          description: 注册时间
        lastLoginTime:
          type: string
          format: date-time
          description: 最后登录时间
          nullable: true

    UpdateUserRequest:
      type: object
      properties:
        nickname:
          type: string
          minLength: 2
          maxLength: 15
          pattern: '^[\u4e00-\u9fa5a-zA-Z0-9_]+$'
          description: 昵称
        gender:
          type: string
          enum: [未知, 男, 女]
        grade:
          type: string
          enum: [大一, 大二, 大三, 大四, 研究生]
        birthDate:
          type: string
          format: date
        department:
          type: string
        height:
          type: integer
          minimum: 100
          maximum: 250
        weight:
          type: number
          format: float
          minimum: 30
          maximum: 250

    Semester:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date

    Course:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        weekPattern:
          type: string
        dayOfWeek:
          type: integer
          minimum: 1
          maximum: 7
        startPeriod:
          type: integer
        endPeriod:
          type: integer
        location:
          type: string
          nullable: true

    CreateCourseRequest:
      type: object
      required:
        - title
        - weekPattern
        - dayOfWeek
        - startPeriod
        - endPeriod
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 20
        weekPattern:
          type: string
          description: 上课周次，如 1-16周
        dayOfWeek:
          type: integer
          minimum: 1
          maximum: 7
        startPeriod:
          type: integer
        endPeriod:
          type: integer
        location:
          type: string
          maxLength: 50

    ScheduleEvent:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        category:
          $ref: '#/components/schemas/CategoryEnum'
        weekPattern:
          type: string
          nullable: true
        dayOfWeek:
          type: integer
          nullable: true
        startPeriod:
          type: integer
          nullable: true
        endPeriod:
          type: integer
          nullable: true
        startTime:
          type: string
          format: date-time
          nullable: true
        endTime:
          type: string
          format: date-time
          nullable: true
        deadline:
          type: string
          format: date-time
          nullable: true
        location:
          type: string
        remark:
          type: string
        reminder:
          $ref: '#/components/schemas/ReminderEnum'
        status:
          $ref: '#/components/schemas/StatusEnum'
        countdown:
          type: string
          nullable: true

    CreateScheduleEventRequest:
      type: object
      required:
        - title
        - category
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 20
        category:
          $ref: '#/components/schemas/CategoryEnum'
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        deadline:
          type: string
          format: date-time
        location:
          type: string
          maxLength: 50
        remark:
          type: string
          maxLength: 200
        reminder:
          $ref: '#/components/schemas/ReminderEnum'
          default: none

    ConflictCheckRequest:
      type: object
      required:
        - category
        - startTime
        - endTime
      properties:
        category:
          $ref: '#/components/schemas/CategoryEnum'
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        excludeId:
          type: string
          description: 编辑时排除自身

    SleepRecord:
      type: object
      properties:
        id:
          type: string
        sleepDate:
          type: string
          format: date
        bedTime:
          type: string
          format: date-time
        wakeTime:
          type: string
          format: date-time
        duration:
          type: number
          format: float
          description: 睡眠时长（小时）
        quality:
          $ref: '#/components/schemas/SleepQualityEnum'
        createTime:
          type: string
          format: date-time

    CreateSleepRequest:
      type: object
      required:
        - bedTime
        - wakeTime
        - quality
      properties:
        bedTime:
          type: string
          format: date-time
        wakeTime:
          type: string
          format: date-time
        quality:
          $ref: '#/components/schemas/SleepQualityEnum'
        recordDate:
          type: string
          format: date
          description: 补录日期（过去7天内）
        confirmAbnormal:
          type: boolean
          default: false
          description: 是否确认异常记录

    ExerciseRecord:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        duration:
          type: integer
        count:
          type: integer
        recordDate:
          type: string
          format: date
        createTime:
          type: string
          format: date-time

    CreateExerciseRequest:
      type: object
      required:
        - type
        - duration
      properties:
        type:
          type: string
        duration:
          type: integer
          minimum: 1
          maximum: 600
        count:
          type: integer
          default: 1
        recordDate:
          type: string
          format: date

    WeightRecord:
      type: object
      properties:
        id:
          type: string
        weight:
          type: number
          format: float
        recordDate:
          type: string
          format: date
        createTime:
          type: string
          format: date-time

    CreateWeightRequest:
      type: object
      required:
        - weight
      properties:
        weight:
          type: number
          format: float
          minimum: 30
          maximum: 250
        recordDate:
          type: string
          format: date

    ChartData:
      type: object
      properties:
        type:
          type: string
          enum: [sleep, exercise, weight]
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        xAxis:
          type: array
          items:
            type: string
        yAxis:
          type: array
          items:
            type: number
            nullable: true
        unit:
          type: string

    SleepAnalysis:
      type: object
      properties:
        alerts:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              suggestion:
                type: string
        summary:
          type: object
          properties:
            avgDuration:
              type: number
              format: float
            avgQuality:
              type: string

    ExerciseAnalysis:
      type: object
      properties:
        defaultTarget:
          type: integer
          description: 默认目标（分钟）
        adjustedTarget:
          type: integer
          description: 调整后目标（分钟）
        adjustReason:
          type: string
          description: 调整原因
        actualMinutes:
          type: integer
        progress:
          type: number
          format: float
        status:
          type: string
          enum: [ahead, normal, behind]
        suggestions:
          type: array
          items:
            type: string

    PressureAnalysis:
      type: object
      properties:
        apiScore:
          type: integer
        level:
          type: string
          enum: [low, medium, high]
        levelText:
          type: string
        breakdown:
          type: object
          properties:
            courseHours:
              type: integer
            courseContribution:
              type: number
              format: float
            examCount:
              type: integer
            examContribution:
              type: number
              format: float
            ddlCount:
              type: integer
            ddlContribution:
              type: number
              format: float
            completionRate:
              type: number
              format: float
            completionContribution:
              type: number
              format: float

    ProcrastinationAnalysis:
      type: object
      properties:
        weekCompletionRate:
          type: integer
        onTimeRate:
          type: integer
        threshold:
          type: integer
        alert:
          type: string
          nullable: true
        suggestion:
          type: string
          nullable: true

    SportSuggestion:
      type: object
      properties:
        hasSuggestion:
          type: boolean
        suggestions:
          type: array
          items:
            type: object
            properties:
              startTime:
                type: string
                format: date-time
              endTime:
                type: string
                format: date-time
              duration:
                type: integer
              message:
                type: string

    WeeklyReport:
      type: object
      properties:
        weekNumber:
          type: integer
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        canRegenerate:
          type: boolean
        regenerateAvailableUntil:
          type: string
          format: date
          nullable: true
        sections:
          type: object
          properties:
            schedule:
              type: object
              properties:
                totalEvents:
                  type: integer
                completed:
                  type: integer
                overdue:
                  type: integer
            sleep:
              type: object
              properties:
                avgDuration:
                  type: number
                  format: float
                avgQuality:
                  type: string
            exercise:
              type: object
              properties:
                totalMinutes:
                  type: integer
                targetMet:
                  type: boolean
            weight:
              type: object
              properties:
                startWeight:
                  type: number
                  format: float
                endWeight:
                  type: number
                  format: float
            pressure:
              type: object
              properties:
                avgScore:
                  type: integer
                trend:
                  type: string
        suggestions:
          type: array
          items:
            type: string

    Announcement:
      type: object
      properties:
        id:
          type: integer
        content:
          type: string
          maxLength: 500
        type:
          type: string
          enum: [system, sport]
        dismissible:
          type: boolean
        status:
          type: string
          enum: [active, offline]
        createTime:
          type: string
          format: date-time

    AdminUser:
      type: object
      properties:
        userId:
          type: string
        phone:
          type: string
        nickname:
          type: string
        gender:
          type: string
        grade:
          type: string
        status:
          type: string
          enum: [normal, frozen]
        freezeReasonCode:
          type: string
          nullable: true
        freezeReasonText:
          type: string
          nullable: true
        freezeTime:
          type: string
          format: date-time
          nullable: true
        createTime:
          type: string
          format: date-time
        lastLoginTime:
          type: string
          format: date-time
          nullable: true

    DashboardData:
      type: object
      properties:
        totalUsers:
          type: integer
        dailyActiveUsers:
          type: integer
        dailyScheduleAdds:
          type: integer
        dailyHealthLogs:
          type: integer
        genderDistribution:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              value:
                type: integer
        gradeDistribution:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              value:
                type: integer
        departmentDistribution:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              value:
                type: integer

    OperationLog:
      type: object
      properties:
        logId:
          type: integer
        adminId:
          type: string
        adminNickname:
          type: string
        action:
          type: string
        actionText:
          type: string
        targetType:
          type: string
          enum: [user, announcement, config]
        targetId:
          type: string
        targetNickname:
          type: string
          nullable: true
        reasonCode:
          type: string
          nullable: true
        reasonText:
          type: string
          nullable: true
        details:
          type: object
        ipAddress:
          type: string
        createTime:
          type: string
          format: date-time

    ExceptionLog:
      type: object
      properties:
        logId:
          type: integer
        userId:
          type: string
        exceptionType:
          type: string
          enum: [content_violation, abnormal_checkin, sql_injection, xss_attack, other]
        exceptionDetail:
          type: string
        requestUrl:
          type: string
        ipAddress:
          type: string
        createTime:
          type: string
          format: date-time

    SystemConfig:
      type: object
      properties:
        health:
          type: object
          properties:
            defaultExerciseTarget:
              type: integer
        api:
          type: object
          properties:
            apiWeights:
              type: object
              properties:
                courseHours:
                  type: integer
                examCount:
                  type: integer
                ddlCount:
                  type: integer
                completionRate:
                  type: integer
        system:
          type: object
          properties:
            logRetentionDays:
              type: integer
            abnormalCheckinThreshold:
              type: integer
            procrastinationThreshold:
              type: integer

    UpdateConfigRequest:
      type: object
      properties:
        health:
          type: object
          properties:
            defaultExerciseTarget:
              type: integer
        api:
          type: object
          properties:
            apiWeights:
              type: object
              properties:
                courseHours:
                  type: integer
                examCount:
                  type: integer
                ddlCount:
                  type: integer
                completionRate:
                  type: integer
        system:
          type: object
          properties:
            logRetentionDays:
              type: integer
            abnormalCheckinThreshold:
              type: integer
            procrastinationThreshold:
              type: integer

paths:
  # ==================== 认证模块 ====================
  /auth/register:
    post:
      security: []
      tags:
        - 认证模块
      summary: 用户注册
      description: 手机号注册新用户
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
                - password
                - verifyCode
              properties:
                phone:
                  type: string
                  pattern: '^1[3-9]\d{9}$'
                  description: 手机号，11位数字
                password:
                  type: string
                  minLength: 8
                  maxLength: 16
                  pattern: '^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]+$'
                  description: 密码，8-16位，必须包含字母与数字
                verifyCode:
                  type: string
                  pattern: '^\d{6}$'
                  description: 短信验证码
            example:
              phone: "13800138000"
              password: "Aa123456"
              verifyCode: "123456"
      responses:
        '200':
          description: 注册成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          userId:
                            type: string
                          token:
                            type: string
              example:
                code: 200
                message: 注册成功
                data:
                  userId: "usr_8位唯一标识"
                  token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 手机号已注册
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      security: []
      tags:
        - 认证模块
      summary: 用户登录
      description: 统一登录入口，根据role字段判断跳转
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
                - password
              properties:
                phone:
                  type: string
                  description: 手机号
                password:
                  type: string
                  description: 登录密码
            example:
              phone: "13800138000"
              password: "Aa123456"
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          userId:
                            type: string
                          nickname:
                            type: string
                          avatar:
                            type: string
                          token:
                            type: string
                          refreshToken:
                            type: string
                          expiresIn:
                            type: integer
                          role:
                            $ref: '#/components/schemas/RoleEnum'
                          forceChangePassword:
                            type: boolean
              examples:
                normal:
                  summary: 正常登录
                  value:
                    code: 200
                    message: 登录成功
                    data:
                      userId: "usr_xxxxxxxx"
                      nickname: "用户_A1b2C3d4"
                      avatar: "https://cdn.example.com/avatar/default.png"
                      token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                      refreshToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                      expiresIn: 604800
                      role: "user"
                tempPassword:
                  summary: 临时密码登录
                  value:
                    code: 200
                    message: 登录成功，请先修改临时密码
                    data:
                      userId: "usr_xxxxxxxx"
                      token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                      refreshToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                      expiresIn: 604800
                      role: "user"
                      forceChangePassword: true
        '403':
          description: 账号冻结
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 403
                subCode: "account_frozen"
                message: "您的账号因[内容违规]已被冻结，请联系管理员"

  /auth/logout:
    post:
      tags:
        - 认证模块
      summary: 用户登出
      description: 退出登录，使当前Token失效
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'
              example:
