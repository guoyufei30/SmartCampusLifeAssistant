    post:
      tags:
        - 用户模块
      summary: 强制修改密码
      description: 用户使用临时密码登录后必须调用此接口修改密码
      operationId: forceChangePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
