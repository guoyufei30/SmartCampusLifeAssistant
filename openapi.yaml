      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - oldPassword
                - newPassword
              properties:
                oldPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
                  maxLength: 16
                  pattern: '^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]+$'
            example:
              oldPassword: "OldPass123"
              newPassword: "NewPass456"
      responses:
        '200':
          description: 修改成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'

